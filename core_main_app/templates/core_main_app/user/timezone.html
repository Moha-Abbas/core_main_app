{% load tz %}
{% block title %}{% endblock %}
{% block content %}
{% if request.user.is_authenticated %}
<div class="am-panel-page am-panel-wrap">
<div class="am-panel-card">
    <h1 class="am-panel-title">Preferences</h1>
    <p class="am-panel-subtitle"><i class="fas fa-globe"></i> Choose the time zone used to display dates across the site.</p>
    <form action="{% url 'core_main_set_timezone' %}" method="POST">
        {% csrf_token %}
        <div class="am-panel-field">
            <label for="timezone">Time zone</label>
            <select name="timezone" id="timezone">
                {% for tz in data.timezones %}
                <option value="{{ tz }}"{% if tz == data.timezone %} selected{% endif %}>{{ tz }}</option>
                {% endfor %}
            </select>
        </div>
        <button type="submit" class="am-panel-submit">Set</button>
    </form>
</div>
</div>

<style>
#content:has(.am-panel-page) {
    background: transparent;
    box-shadow: none;
    border-radius: 0;
    padding: 40px 0;
}
.am-panel-wrap {
    display: flex;
    justify-content: center;
}
.am-panel-card {
    width: 100%;
    max-width: 420px;
    background: #fff;
    border-radius: 22px;
    box-shadow: 0 8px 32px rgba(30, 41, 59, 0.1);
    border: 1px solid #e2e8f0;
    padding: 40px 34px 34px;
}
.am-panel-title {
    margin: 0 0 4px;
    font-size: 1.7rem;
    font-weight: 700;
    color: #3CACA8;
    text-align: center;
}
.am-panel-subtitle {
    margin: 0 0 22px;
    color: #64748b;
    font-size: 0.95rem;
    text-align: center;
}
.am-panel-field {
    margin-bottom: 16px;
    text-align: left;
}
.am-panel-field label {
    display: block;
    margin-bottom: 6px;
    font-weight: 600;
    color: #2c3e50;
    font-size: 0.92rem;
}
.am-panel-field select {
    width: 100%;
    box-sizing: border-box;
    padding: 11px 14px;
    border: 2px solid #b2c2d6 !important;
    border-radius: 10px !important;
    font-size: 1rem;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
}
.am-panel-field select:focus {
    outline: none;
    border-color: #3CACA8 !important;
    box-shadow: 0 0 0 3px rgba(60, 172, 168, 0.18) !important;
}
.am-panel-submit {
    display: block;
    width: 100%;
    margin: 6px 0 0;
    padding: 12px 0;
    background: linear-gradient(90deg, #3CACA8, #5ABCB8);
    color: #fff;
    font-size: 1.05rem;
    font-weight: bold;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}
.am-panel-submit:hover,
.am-panel-submit:focus {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(60, 172, 168, 0.35);
    color: #fff;
}
</style>
{% endif %}
{% endblock %}
